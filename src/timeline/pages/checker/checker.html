<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="checkerTitle">Broken Bookmark Checker</title>
  <link rel="stylesheet" href="../../shared/apple-design-system.css">
  <link rel="stylesheet" href="checker.css">
  <link rel="stylesheet" href="../../shared/apple-page-polish.css">
</head>
<body data-page="checker">
  <div class="checker-container">
    <!-- 顶部导航 -->
    <header class="checker-header">
      <div class="checker-header-inner">
        <button id="backBtn" class="back-btn" data-i18n-title="back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <h1 class="checker-title" data-i18n="checkerTitle">Broken Bookmark Checker</h1>
        <nav class="page-nav" aria-label="AI Bookmark OS">
          <button id="workspaceBtn" class="page-nav-btn" type="button">工作台</button>
          <button id="aiClassifyBtn" class="page-nav-btn" type="button">AI 分类</button>
          <button id="bookmarkNavBtn" class="page-nav-btn" type="button">书签导航</button>
          <button id="checkerBtn" class="page-nav-btn active" type="button" aria-current="page">失效检查</button>
          <button id="graphBtn" class="page-nav-btn" type="button">图谱</button>
          <button id="settingsBtn" class="page-nav-btn" type="button">设置</button>
        </nav>
      </div>
    </header>

    <!-- 内容区 -->
    <div class="checker-content">
      <!-- 摘要统计 -->
      <div class="summary-bar" id="summaryBar" style="display:none;">
        <div class="summary-item summary-total">
          <span class="summary-num" id="totalChecked">0</span>
          <span class="summary-label" data-i18n="checkerTotal">Total</span>
        </div>
        <div class="summary-item summary-ok">
          <span class="summary-num" id="totalOk">0</span>
          <span class="summary-label" data-i18n="checkerOk">Normal</span>
        </div>
        <div class="summary-item summary-broken">
          <span class="summary-num" id="totalBroken">0</span>
          <span class="summary-label" data-i18n="checkerBroken">Confirmed invalid</span>
        </div>
        <div class="summary-item summary-warning">
          <span class="summary-num" id="totalWarning">0</span>
          <span class="summary-label" data-i18n="checkerWarning">Needs review</span>
        </div>
      </div>

      <!-- 操作栏 -->
      <div class="action-bar">
        <button id="startCheckBtn" class="action-btn action-btn--primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span data-i18n="checkerStart">Start Check</span>
        </button>
        <button id="stopCheckBtn" class="action-btn action-btn--danger" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          </svg>
          <span data-i18n="checkerStop">Stop</span>
        </button>
        <button id="selectConfirmedBtn" class="action-btn action-btn--danger-outline" type="button" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <polyline points="8 12 11 15 16 9"/>
          </svg>
          <span data-i18n="checkerSelectConfirmed">Select confirmed missing</span>
        </button>
        <button id="selectReviewBtn" class="action-btn action-btn--review-outline" type="button" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <polyline points="8 12 11 15 16 9"/>
          </svg>
          <span data-i18n="checkerSelectReview">Select needs review</span>
        </button>
        <button id="recheckSelectedBtn" class="action-btn action-btn--primary" type="button" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2v6h-6"/>
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/>
            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
          <span data-i18n="checkerRecheckSelected">Recheck selected</span>
          <span id="recheckSelectionCount">0</span>
        </button>
        <button id="clearSelectionBtn" class="action-btn action-btn--danger-outline" type="button" style="display:none;">
          <span data-i18n="checkerClearSelection">Clear selection</span>
        </button>
        <button id="deleteSelectedBtn" class="action-btn action-btn--danger-outline" type="button" style="display:none;">
          <span data-i18n="checkerDeleteSelected">Delete selected</span>
          <span id="selectionCount">0</span>
        </button>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all" data-i18n="checkerFilterAll">All</button>
          <button class="filter-btn" data-filter="broken" data-i18n="checkerFilterBroken">Confirmed invalid</button>
          <button class="filter-btn" data-filter="warning" data-i18n="checkerFilterWarning">Needs review</button>
          <button class="filter-btn" data-filter="ok" data-i18n="checkerFilterOk">Normal</button>
        </div>
      </div>

      <!-- 进度条 -->
      <div class="progress-bar" id="progressBar" style="display:none;" role="progressbar" aria-label="链接检测进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="progress-fill" id="progressFill"></div>
        <span class="progress-text" id="progressText">0%</span>
      </div>

      <p id="checkerLiveStatus" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></p>

      <!-- 空状态 -->
      <div id="emptyState" class="state-view">
        <svg class="state-illustration" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <p class="state-title" data-i18n="checkerEmptyTitle">Click "Start Check" to detect broken bookmarks</p>
        <p class="state-hint" data-i18n="checkerEmptyHint">This will check all bookmark links for availability</p>
      </div>

      <!-- 加载状态 -->
      <div id="loadingState" class="state-view" style="display:none;">
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
        <p class="state-title" data-i18n="checkerLoading">Loading bookmarks...</p>
      </div>

      <!-- 结果列表 -->
      <div id="resultList" class="result-list" style="display:none;" aria-label="检测结果"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container"></div>

  <div id="deleteConfirmOverlay" class="delete-confirm-overlay" hidden>
    <section id="deleteConfirmDialog" class="delete-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle" aria-describedby="deleteConfirmSummary" tabindex="-1">
      <h2 id="deleteConfirmTitle" data-i18n="checkerDeleteConfirmTitle">Confirm deletion</h2>
      <p id="deleteConfirmSummary"></p>
      <label id="manualConfirmRow" hidden>
        <input id="manualConfirmCheckbox" type="checkbox">
        <span data-i18n="checkerManualConfirm">I have manually confirmed the review items.</span>
      </label>
      <div class="delete-confirm-actions">
        <button id="cancelDeleteBtn" type="button" class="action-btn" data-i18n="cancel">Cancel</button>
        <button id="confirmDeleteBtn" type="button" class="action-btn action-btn--danger" data-i18n="delete">Delete</button>
      </div>
    </section>
  </div>

  <script src="../../shared/i18n.js"></script>
  <script src="../../shared/page-router.js"></script>
  <script src="checker.js"></script>
</body>
</html>
