<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="graphTitle">Bookmark Knowledge Graph</title>
  <link rel="stylesheet" href="../../shared/apple-design-system.css">
  <link rel="stylesheet" href="graph.css">
  <link rel="stylesheet" href="../../shared/apple-page-polish.css">
</head>
<body data-page="graph">
  <div class="graph-container">
    <!-- 顶部导航 -->
    <header class="graph-header">
      <div class="graph-header-inner">
        <button id="backBtn" class="back-btn" data-i18n-title="back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <h1 class="graph-title" data-i18n="graphTitle">Bookmark Knowledge Graph</h1>
        <nav class="page-nav" aria-label="AI Bookmark OS">
          <button id="workspaceBtn" class="page-nav-btn" type="button">工作台</button>
          <button id="bookmarkNavBtn" class="page-nav-btn" type="button">书签导航</button>
          <button id="aiClassifyBtn" class="page-nav-btn" type="button">AI 分类</button>
          <button id="settingsBtn" class="page-nav-btn" type="button">设置</button>
        </nav>
        <div class="graph-stats" id="graphStats"></div>
      </div>
    </header>

    <!-- 工具栏 -->
    <div class="graph-toolbar">
      <div class="toolbar-group">
        <label class="toolbar-label" data-i18n="graphClusterBy">Cluster by</label>
        <select id="clusterSelect" class="toolbar-select">
          <option value="domain" data-i18n="graphClusterDomain">Domain</option>
          <option value="tag" data-i18n="graphClusterTag">Tag</option>
          <option value="folder" data-i18n="graphClusterFolder">Folder</option>
        </select>
      </div>
      <div class="toolbar-group">
        <label class="toolbar-label" data-i18n="graphLinkBy">Link by</label>
        <label class="checkbox-label">
          <input type="checkbox" id="linkDomain" checked>
          <span data-i18n="graphClusterDomain">Domain</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="linkTag" checked>
          <span data-i18n="graphClusterTag">Tag</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="linkSimilar" checked>
          <span data-i18n="graphLinkSimilar">Similar title</span>
        </label>
      </div>
      <!-- 搜索框 -->
      <div class="toolbar-group toolbar-search">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search nodes..." data-i18n-placeholder="graphSearchPlaceholder">
        <span id="searchCount" class="search-count" style="display:none;"></span>
      </div>
      <div class="toolbar-group toolbar-group--right">
        <button id="resetViewBtn" class="toolbar-btn" data-i18n-title="graphResetView">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <polyline points="23 20 23 14 17 14"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
          <span data-i18n="graphResetView">Reset</span>
        </button>
        <button id="reLayoutBtn" class="toolbar-btn" data-i18n-title="graphRelayout">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/>
            <circle cx="6" cy="18" r="3"/><circle cx="18" cy="18" r="3"/>
            <line x1="9" y1="6" x2="15" y2="6"/><line x1="6" y1="9" x2="6" y2="15"/>
            <line x1="18" y1="9" x2="18" y2="15"/><line x1="9" y1="18" x2="15" y2="18"/>
          </svg>
          <span data-i18n="graphRelayout">Re-layout</span>
        </button>
        <button id="exportBtn" class="toolbar-btn" data-i18n-title="graphExport">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span data-i18n="graphExport">Export</span>
        </button>
      </div>
    </div>

    <!-- 图谱容器（Cytoscape.js 渲染目标） -->
    <div class="graph-canvas-wrap">
      <!-- 背景粒子层 -->
      <canvas id="particleCanvas" class="particle-canvas"></canvas>
      <!-- Cytoscape 图谱层 -->
      <div id="cy" class="cy-container"></div>

      <!-- 空状态 -->
      <div id="graphEmpty" class="graph-empty" style="display:none;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <p class="empty-title" data-i18n="graphEmptyTitle">No bookmarks to visualize</p>
        <p class="empty-hint" data-i18n="graphEmptyHint">Sync your bookmarks first</p>
      </div>

      <!-- 加载状态 -->
      <div id="graphLoading" class="graph-loading">
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- 悬浮信息卡 -->
      <div id="hoverCard" class="hover-card" style="display:none;">
        <div class="hover-card-title" id="hoverTitle"></div>
        <div class="hover-card-meta" id="hoverMeta"></div>
        <div class="hover-card-tags" id="hoverTags"></div>
      </div>

      <!-- 图例 -->
      <div class="graph-legend" id="graphLegend"></div>

      <!-- 边类型图例 -->
      <div class="edge-legend">
        <div class="edge-legend-title" data-i18n="graphEdgeTypes">Edge Types</div>
        <div class="edge-legend-item">
          <span class="edge-legend-line edge-legend-line--domain"></span>
          <span data-i18n="graphEdgeDomain">Domain</span>
        </div>
        <div class="edge-legend-item">
          <span class="edge-legend-line edge-legend-line--tag"></span>
          <span data-i18n="graphEdgeTag">Tag</span>
        </div>
        <div class="edge-legend-item">
          <span class="edge-legend-line edge-legend-line--similar"></span>
          <span data-i18n="graphEdgeSimilar">Similar</span>
        </div>
      </div>

      <!-- 缩放控制 -->
      <div class="zoom-controls">
        <button id="zoomInBtn" class="zoom-btn" data-i18n-title="graphZoomIn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <button id="zoomOutBtn" class="zoom-btn" data-i18n-title="graphZoomOut">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <span class="zoom-level" id="zoomLevel">100%</span>
      </div>
    </div>
  </div>

  <script src="../../shared/i18n.js"></script>
  <script src="../../shared/smart-tagger.js"></script>
  <script src="../../background/vendor/cytoscape.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
