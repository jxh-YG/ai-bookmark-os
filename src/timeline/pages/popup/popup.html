<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Bookmark OS</title>
  <link rel="stylesheet" href="../../shared/apple-design-system.css">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="../../shared/apple-page-polish.css">
</head>
<body data-page="popup">
  <!-- 顶部统一 Chrome：品牌 + 主操作 + 搜索 + AI 入口 -->
  <section class="popup-chrome" aria-label="主工具区">
    <header class="topbar">
      <div class="topbar-left">
        <svg class="logo-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <div class="topbar-brand">
          <span class="app-name">AI Bookmark OS</span>
          <span class="count-chip" id="bookmarkCount">0</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="quickBookmarkBtn" class="icon-btn quick-bookmark-btn" title="收藏当前页" aria-label="收藏当前页">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <button id="syncBtn" class="icon-btn" data-i18n-title="syncBookmarks" aria-label="同步书签">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
        <button id="aiClassifyBtn" class="icon-btn ai-classify-btn" title="AI 金字塔分类" aria-label="AI 金字塔分类">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/>
            <path d="M12 12l8-4.5"/>
            <path d="M12 12v9"/>
            <path d="M12 12L4 7.5"/>
          </svg>
        </button>
        <button id="paletteBtn" class="icon-btn" data-i18n-title="openCommandPalette" aria-label="命令面板">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <div class="sort-dropdown">
          <button id="sortBtn" class="sort-dropdown-btn" data-i18n-title="sortBy" aria-label="排序">
            <svg id="sortIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </button>
          <div id="sortDropdown" class="sort-dropdown-menu">
            <button class="sort-dropdown-item active" data-sort="newest" data-i18n-title="sortNewest">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"/><polyline points="5 12 12 5 19 12"/>
              </svg>
            </button>
            <button class="sort-dropdown-item" data-sort="oldest" data-i18n-title="sortOldest">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
              </svg>
            </button>
            <button class="sort-dropdown-item" data-sort="hottest" data-i18n-title="sortHottest">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>
            </button>
            <button class="sort-dropdown-item" data-sort="coldest" data-i18n-title="sortColdest">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="12" y1="3" x2="12" y2="5"/><line x1="10" y1="4" x2="11" y2="6"/><line x1="14" y1="4" x2="13" y2="6"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="chrome-tools">
      <div class="search-bar">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchInput" type="text" data-i18n-placeholder="searchPlaceholder" autocomplete="off">
        <button id="searchClear" class="search-clear" style="display:none;" aria-label="清空搜索">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div id="searchSuggest" class="search-suggest" role="listbox" style="display:none;"></div>
      </div>

      <div id="aiEntryBanner" class="ai-entry-banner" role="region" aria-label="AI 分类">
        <div class="ai-entry-banner__text">
          <strong>AI 金字塔分类</strong>
          <span>一键整理书签树</span>
        </div>
        <button id="aiEntryBannerBtn" class="ai-entry-banner__btn" type="button">打开</button>
      </div>
    </div>

    <!-- 兼容旧脚本：保留隐藏入口，功能移至底部菜单 -->
    <div class="chrome-legacy-actions" hidden>
      <button id="clearBtn" type="button" data-i18n-title="clearRecords"></button>
      <button id="bookmarkNavBtn" type="button" title="AI 书签导航"></button>
      <button id="workspaceBtn" type="button" data-i18n-title="openWorkspace" title="打开工作台"></button>
    </div>
  </section>

  <div class="view-toolbar">
    <div class="view-tabs">
      <button class="view-tab active" data-view="all" data-i18n="viewAll">全部</button>
      <button class="view-tab" data-view="pinned" data-i18n="viewPinned">置顶</button>
      <button class="view-tab" data-view="duplicates" data-i18n="viewDuplicates">重复</button>
    </div>
    <button id="bulkToggleBtn" class="bulk-toggle" data-i18n-title="bulkSelect" data-active="false">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 11 12 14 22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      <span data-i18n="bulkSelect">多选</span>
    </button>
  </div>

  <!-- 批量操作浮动栏 -->
  <div id="bulkActionBar" class="bulk-action-bar" style="display:none;">
    <div class="bulk-action-bar-inner">
      <span class="bulk-count"><span id="bulkCount">0</span> <span data-i18n="selected">已选</span></span>
      <div class="bulk-actions">
        <button id="bulkSelectAll" class="bulk-btn" data-i18n="selectAll">全选</button>
        <button id="bulkPinBtn" class="bulk-btn" data-i18n-title="pinSelected">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span data-i18n="pin">置顶</span>
        </button>
        <button id="bulkTagBtn" class="bulk-btn" data-i18n-title="tagSelected">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <span data-i18n="tag">标签</span>
        </button>
        <button id="bulkDeleteBtn" class="bulk-btn bulk-btn--danger" data-i18n-title="deleteSelected">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <span data-i18n="delete">删除</span>
        </button>
        <button id="bulkCancelBtn" class="bulk-btn bulk-btn--cancel" data-i18n="cancel">取消</button>
      </div>
    </div>
  </div>

  <!-- 标签筛选栏 -->
  <div class="tag-bar" id="tagBar">
    <div class="tag-bar-scroll">
      <button class="tag-chip active" data-tag="__all__">
        <span class="tag-chip-label" data-i18n="tagAll">全部</span>
        <span class="tag-chip-count" id="tagAllCount">0</span>
      </button>
      <!-- 标签 chips 由 JS 动态渲染 -->
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main">
    <div id="timelineLoading" class="state-view">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="timelineEmpty" class="state-view" style="display:none;">
      <svg class="empty-illustration" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <p class="empty-title" data-i18n="emptyTitle">还没有书签记录</p>
      <p class="empty-hint" data-i18n="emptyHint">点击右上角同步按钮导入书签</p>
    </div>

    <div id="timelineContent" class="timeline" style="display:none;">
      <!-- 日期分组 + 书签列表由 JS 渲染 -->
    </div>

    <div id="searchEmpty" class="state-view" style="display:none;">
      <p class="empty-title" data-i18n="searchEmptyTitle">没有找到匹配的书签</p>
      <p class="empty-hint" data-i18n="searchEmptyHint">试试其他关键词</p>
    </div>

    <!-- 最近删除视图 -->
    <div id="deletedView" class="deleted-view" style="display:none;">
      <div class="deleted-header">
        <button id="deletedBackBtn" class="icon-btn" data-i18n-title="back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="deleted-title" data-i18n="recentlyDeleted">最近删除</span>
        <span class="deleted-retention" id="deletedRetentionHint"></span>
        <button id="deletedClearAllBtn" class="icon-btn" data-i18n-title="clearAllDeleted" style="margin-left:auto;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
          </svg>
        </button>
      </div>
      <div id="deletedEmpty" class="state-view" style="display:none;">
        <p class="empty-title" data-i18n="deletedEmptyTitle">暂无最近删除</p>
        <p class="empty-hint" data-i18n="deletedEmptyHint">删除的书签会出现在这里</p>
      </div>
      <div id="deletedList" class="deleted-list">
        <!-- tombstone 列表由 JS 渲染 -->
      </div>
    </div>
  </div>

  <!-- 底部栏 -->
  <footer class="bottombar">
    <button id="footerSettingsBtn" class="icon-btn" data-i18n-title="settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <span class="bottombar-version" id="versionLabel">v1.0.1</span>
    <div class="bottombar-menu-wrap">
      <button id="footerMenuBtn" class="icon-btn" data-i18n-title="moreOptions">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="5" cy="12" r="1.6"/>
          <circle cx="12" cy="12" r="1.6"/>
          <circle cx="19" cy="12" r="1.6"/>
        </svg>
      </button>
      <div id="footerMenu" class="footer-menu">
        <button class="footer-menu-item" id="menuAiClassifyBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/>
            <path d="M12 12l8-4.5"/>
            <path d="M12 12v9"/>
            <path d="M12 12L4 7.5"/>
          </svg>
          <span>AI 金字塔分类</span>
        </button>
        <button class="footer-menu-item" id="menuBookmarkNavBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            <path d="M9 7h6"/>
            <path d="M9 11h6"/>
          </svg>
          <span>AI 书签导航</span>
        </button>
        <button class="footer-menu-item" id="menuAiSettingsBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.36 0 .7.13 1 .37H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>AI 设置</span>
        </button>
        <button class="footer-menu-item" id="menuCheckerBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span data-i18n="checkerTitle">失效书签检测</span>
        </button>
        <button class="footer-menu-item" id="menuGraphBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="2"/>
            <circle cx="5" cy="5" r="2"/>
            <circle cx="19" cy="5" r="2"/>
            <circle cx="5" cy="19" r="2"/>
            <circle cx="19" cy="19" r="2"/>
            <line x1="6.5" y1="6.5" x2="10.5" y2="10.5"/>
            <line x1="17.5" y1="6.5" x2="13.5" y2="10.5"/>
            <line x1="6.5" y1="17.5" x2="10.5" y2="13.5"/>
            <line x1="17.5" y1="17.5" x2="13.5" y2="13.5"/>
          </svg>
          <span data-i18n="graphTitle">书签知识图谱</span>
        </button>
        <button class="footer-menu-item" id="menuClearBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          <span data-i18n="clearRecords">清空记录</span>
        </button>
        <button class="footer-menu-item" id="menuDeletedBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          <span data-i18n="recentlyDeleted">最近删除</span>
        </button>
        <button class="footer-menu-item" id="menuStatsBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          <span data-i18n="statsSection">Statistics</span>
        </button>
        <button class="footer-menu-item" id="menuPanelBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
          <span data-i18n="openWorkspace">打开工作台</span>
        </button>
      </div>
    </div>
  </footer>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Hover 预览卡片 (由 JS 动态构建) -->

  <!-- 编辑弹窗 -->
  <div id="editModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" data-i18n="editBookmark">编辑书签</span>
        <button id="editModalClose" class="icon-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <label class="edit-label" data-i18n="editTitle">标题</label>
        <input id="editTitle" class="edit-input" type="text">
        <label class="edit-label" data-i18n="editUrl">网址</label>
        <input id="editUrl" class="edit-input" type="url">
        <label class="edit-label" data-i18n="editTags">标签</label>
        <div class="edit-tags-area">
          <div id="editTagsList" class="edit-tags-list"></div>
          <div class="edit-tags-input-row">
            <input id="editTagInput" class="edit-input edit-tag-input" type="text" data-i18n-placeholder="editTagPlaceholder" placeholder="输入标签名，回车添加">
            <div id="editTagSuggestions" class="edit-tag-suggestions"></div>
          </div>
        </div>
        <label class="edit-label" data-i18n="editLocation">位置</label>
        <div id="editFolderSelector" class="edit-folder-selector">
          <span id="editFolderPath" class="edit-folder-path"></span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
        <div id="editFolderTree" class="edit-folder-tree" style="display:none;">
          <div id="editFolderTreeInner"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="editCancel" class="modal-btn modal-btn--cancel" data-i18n="cancel">取消</button>
        <button id="editSave" class="modal-btn modal-btn--save" data-i18n="save">保存</button>
      </div>
    </div>
  </div>

  <!-- 命令面板 (Ctrl+Shift+E) -->
  <div id="paletteModal" class="palette-overlay" style="display:none;">
    <div class="palette">
      <div class="palette-input-wrap">
        <svg class="palette-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="paletteInput" class="palette-input" type="text" autocomplete="off" spellcheck="false" data-i18n-placeholder="palettePlaceholder" placeholder="搜索书签、回车直达...">
        <span class="palette-hint" id="paletteHint">↑↓ Enter</span>
      </div>
      <div id="paletteResults" class="palette-results">
        <!-- 结果由 JS 渲染 -->
      </div>
      <div class="palette-footer">
        <span class="palette-hint-text"><kbd>↑</kbd><kbd>↓</kbd> <span data-i18n="paletteNavigate">导航</span></span>
        <span class="palette-hint-text"><kbd>Enter</kbd> <span data-i18n="paletteOpen">打开</span></span>
        <span class="palette-hint-text"><kbd>Esc</kbd> <span data-i18n="paletteClose">关闭</span></span>
      </div>
    </div>
  </div>

  <!-- 批量打标签弹窗 -->
  <div id="bulkTagModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" data-i18n="bulkTagTitle">批量打标签</span>
        <button id="bulkTagClose" class="icon-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="bulk-tag-hint" data-i18n="bulkTagHint">输入标签，多个用逗号分隔</p>
        <input id="bulkTagInput" class="edit-input" type="text" data-i18n-placeholder="bulkTagPlaceholder" placeholder="例如：工具, 阅读, 收藏">
        <div id="bulkTagSuggestions" class="edit-tag-suggestions" style="display:none;position:static;border:none;box-shadow:none;padding:0;margin-top:4px;"></div>
      </div>
      <div class="modal-footer">
        <button id="bulkTagCancel" class="modal-btn modal-btn--cancel" data-i18n="cancel">取消</button>
        <button id="bulkTagAdd" class="modal-btn modal-btn--save" data-i18n="bulkTagAdd">添加</button>
      </div>
    </div>
  </div>

  <!-- 隐藏的文件输入（保留以备未来使用） -->
  <!-- 当前导入/导出统一在设置页面进行 -->

  <script src="../../shared/i18n.js"></script>
  <script src="../../shared/smart-tagger.js"></script>
  <script src="../../background/vendor/Readability.js"></script>
  <script src="popup.js"></script>
</body>
</html>
