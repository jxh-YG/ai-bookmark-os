<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Bookmark OS</title>
  <link rel="stylesheet" href="../../shared/apple-design-system.css">
  <link rel="stylesheet" href="standalone.css">
  <link rel="stylesheet" href="mdi-manager.css">
  <link rel="stylesheet" href="feed-view.css">
  <link rel="stylesheet" href="../../shared/apple-page-polish.css">
</head>
<body data-page="standalone" class="standalone-mode">
  <!-- 顶部工具栏 -->
  <header class="sa-toolbar">
    <div class="sa-toolbar-left">
      <button class="sa-sidebar-toggle" id="saSidebarToggle" data-i18n-title="toggleSidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <svg class="sa-logo-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="sa-app-name">AI Bookmark OS</span>
    </div>
    <div class="sa-search-wrap">
      <svg class="sa-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="saSearchInput" type="text" data-i18n-placeholder="searchPlaceholder" autocomplete="off">
      <button id="saSearchClear" class="sa-search-clear" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sa-toolbar-right">
      <div class="sa-view-switch">
        <button class="sa-view-btn active" data-view="timeline" data-i18n-title="viewTimeline">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="4" x2="21" y2="4"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="20" x2="21" y2="20"/>
          </svg>
        </button>
        <button class="sa-view-btn" data-view="grid" data-i18n-title="viewGrid">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <button class="sa-view-btn" data-view="list" data-i18n-title="viewList">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="sa-sort-dropdown">
        <button id="saSortBtn" class="sa-sort-dropdown-btn" data-i18n-title="sortBy">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
        <div id="saSortDropdown" class="sa-sort-dropdown-menu">
          <button class="sa-sort-dropdown-item active" data-sort="newest" data-i18n-title="sortNewest">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
          <button class="sa-sort-dropdown-item" data-sort="oldest" data-i18n-title="sortOldest">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
            </svg>
          </button>
          <button class="sa-sort-dropdown-item" data-sort="hottest" data-i18n-title="sortHottest">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </button>
          <button class="sa-sort-dropdown-item" data-sort="coldest" data-i18n-title="sortColdest">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="12" y1="3" x2="12" y2="5"/><line x1="10" y1="4" x2="11" y2="6"/><line x1="14" y1="4" x2="13" y2="6"/>
            </svg>
          </button>
        </div>
      </div>
      <button id="saAiClassifyBtn" class="sa-icon-btn sa-ai-btn" title="AI 金字塔分类">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/>
          <path d="M12 12l8-4.5"/>
          <path d="M12 12v9"/>
          <path d="M12 12L4 7.5"/>
        </svg>
      </button>
      <button id="saBookmarkNavBtn" class="sa-icon-btn sa-bookmark-nav-btn" title="AI 书签导航">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          <path d="M9 7h6"/>
          <path d="M9 11h6"/>
        </svg>
      </button>
      <button id="saCheckerBtn" class="sa-icon-btn" title="失效书签检测">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </button>
      <button id="saGraphBtn" class="sa-icon-btn" title="书签知识图谱">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="2"/>
          <circle cx="5" cy="5" r="2"/>
          <circle cx="19" cy="5" r="2"/>
          <circle cx="5" cy="19" r="2"/>
          <circle cx="19" cy="19" r="2"/>
          <line x1="6.5" y1="6.5" x2="10.5" y2="10.5"/>
          <line x1="17.5" y1="6.5" x2="13.5" y2="10.5"/>
          <line x1="6.5" y1="17.5" x2="10.5" y2="13.5"/>
          <line x1="17.5" y1="17.5" x2="13.5" y2="13.5"/>
        </svg>
      </button>
      <button id="saSettingsBtn" class="sa-icon-btn" title="统一设置">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.36 0 .7.13 1 .37H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="saSyncBtn" class="sa-icon-btn" data-i18n-title="syncBookmarks">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <button id="saPaletteBtn" class="sa-icon-btn" data-i18n-title="openCommandPalette">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button id="saThemeBtn" class="sa-icon-btn" data-i18n-title="toggleTheme">
        <svg class="theme-icon-light" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="theme-icon-dark" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- 主体区域 -->
  <div class="sa-body">
    <div class="sa-body-main">
    <!-- 侧栏 -->
    <aside class="sa-sidebar" id="saSidebar">
      <!-- 侧栏顶部：书签/RSS 切换 -->
      <div class="sa-sidebar-tabs" id="saSidebarTabs">
        <button class="sa-sidebar-tab active" data-tab="bookmarks">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
          <span data-i18n="bookmarksTab">书签</span>
          <span class="sa-tab-badge" id="saBookmarkCount">0</span>
        </button>
        <button class="sa-sidebar-tab" data-tab="rss">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 11a9 9 0 0 1 9 9"/>
            <path d="M4 4a16 16 0 0 1 16 16"/>
            <circle cx="5" cy="19" r="1"/>
          </svg>
          <span data-i18n="rssFeeds">RSS订阅</span>
          <span class="sa-tab-badge" id="saRssUnreadCount" style="display:none;">0</span>
        </button>
      </div>

      <!-- 书签面板：文件夹树 + 标签筛选 -->
      <div class="sa-sidebar-panel" id="saSidebarBookmarks">
        <div class="sa-sidebar-section">
          <div class="sa-sidebar-section-header">
            <span class="sa-sidebar-section-title" data-i18n="folderTree">文件夹</span>
            <div class="sa-sidebar-section-actions">
              <button id="saCollapseAllBtn" class="sa-sidebar-action" data-i18n-title="collapseAll">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="4 14 10 14 10 20"/>
                  <polyline points="20 10 14 10 14 4"/>
                  <line x1="14" y1="10" x2="21" y2="3"/>
                  <line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
              </button>
              <button id="saExpandAllBtn" class="sa-sidebar-action" data-i18n-title="expandAll">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="15 3 21 3 21 9"/>
                  <polyline points="9 21 3 21 3 15"/>
                  <line x1="21" y1="3" x2="14" y2="10"/>
                  <line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="saFolderTree" class="sa-folder-tree"></div>
        </div>
        <div class="sa-sidebar-divider"></div>
        <div class="sa-sidebar-section">
          <div class="sa-sidebar-section-header">
            <span class="sa-sidebar-section-title" data-i18n="tagFilter">标签筛选</span>
          </div>
          <div id="saTagFilter" class="sa-tag-filter">
            <button class="sa-tag-chip active" data-tag="__all__">
              <span class="sa-tag-chip-label" data-i18n="tagAll">全部</span>
              <span class="sa-tag-chip-count" id="saTagAllCount">0</span>
            </button>
          </div>
        </div>
      </div>

      <!-- RSS 面板：订阅列表 -->
      <div class="sa-sidebar-panel" id="saSidebarRss" style="display:none;">
        <div class="sa-sidebar-section sa-sidebar-section--rss">
          <div class="sa-sidebar-section-header">
            <span class="sa-sidebar-section-title" data-i18n="rssFeeds">RSS 订阅</span>
            <div class="sa-sidebar-section-actions">
              <button id="saRssAddBtn" class="sa-sidebar-action" data-i18n-title="rssAddFeed">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </button>
              <button id="saRssRefreshAllBtn" class="sa-sidebar-action" data-i18n-title="rssRefreshAll">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="saRssFeedList" class="sa-rss-feed-list"></div>
        </div>
      </div>
    </aside>

    <!-- 侧栏拖拽调整手柄 -->
    <div class="sa-sidebar-resize" id="saSidebarResize"></div>

    <!-- 主内容区 -->
    <main class="sa-content" id="saContent">
      <!-- 时间线视图 -->
      <div id="saTimelineView" class="sa-view sa-view--timeline"></div>
      <!-- 网格视图 -->
      <div id="saGridView" class="sa-view sa-view--grid" style="display:none;"></div>
      <!-- 列表视图 -->
      <div id="saListView" class="sa-view sa-view--list" style="display:none;"></div>
      <!-- RSS 订阅视图 -->
      <div id="saFeedView" class="sa-view sa-view--feed" style="display:none;"></div>

      <!-- 加载状态 -->
      <div id="saLoading" class="sa-state-view">
        <div class="sa-loading-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
      <!-- 空状态 -->
      <div id="saEmpty" class="sa-state-view" style="display:none;">
        <svg class="sa-empty-illustration" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <p class="sa-empty-title" data-i18n="emptyTitle">还没有书签记录</p>
        <p class="sa-empty-hint" data-i18n="emptyHint">点击右上角同步按钮导入书签</p>
      </div>
      <!-- 搜索空状态 -->
      <div id="saSearchEmpty" class="sa-state-view" style="display:none;">
        <p class="sa-empty-title" data-i18n="searchEmptyTitle">没有找到匹配的书签</p>
        <p class="sa-empty-hint" data-i18n="searchEmptyHint">试试其他关键词</p>
      </div>

      <!-- MDI 桌面区域 (覆盖在书签列表上方) -->
      <div class="sa-mdi-desktop" id="saMdiDesktop">
        <div class="sa-mdi-desktop-area" id="saMdiDesktopArea"></div>
      </div>
    </main>
    </div>

    <!-- MDI 任务栏 (固定在 sa-body 底部) -->
    <div class="sa-mdi-taskbar" id="saMdiTaskbar"></div>
  </div>

  <!-- 状态栏 -->
  <footer class="sa-statusbar">
    <span id="saStatusText" data-i18n="statusReady">就绪</span>
    <span class="sa-status-right" id="saStatusFolder"></span>
  </footer>

  <!-- Toast -->
  <div id="saToastContainer" class="sa-toast-container"></div>

  <!-- Hover 预览卡片 (由 JS 动态构建) -->

  <!-- 编辑弹窗 -->
  <div id="saEditModal" class="sa-modal-overlay" style="display:none;">
    <div class="sa-modal">
      <div class="sa-modal-header">
        <span class="sa-modal-title" data-i18n="editBookmark">编辑书签</span>
        <button id="saEditModalClose" class="sa-icon-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="sa-modal-body">
        <label class="sa-edit-label" data-i18n="editTitle">标题</label>
        <input id="saEditTitle" class="sa-edit-input" type="text">
        <label class="sa-edit-label" data-i18n="editUrl">网址</label>
        <input id="saEditUrl" class="sa-edit-input" type="url">
        <label class="sa-edit-label" data-i18n="editTags">标签</label>
        <div class="sa-edit-tags-area">
          <div id="saEditTagsList" class="sa-edit-tags-list"></div>
          <div class="sa-edit-tags-input-row">
            <input id="saEditTagInput" class="sa-edit-input sa-edit-tag-input" type="text" data-i18n-placeholder="editTagPlaceholder">
            <div id="saEditTagSuggestions" class="sa-edit-tag-suggestions"></div>
          </div>
        </div>
        <label class="sa-edit-label" data-i18n="editLocation">位置</label>
        <div id="saEditFolderSelector" class="sa-edit-folder-selector">
          <span id="saEditFolderPath" class="sa-edit-folder-path"></span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
        <div id="saEditFolderTree" class="sa-edit-folder-tree" style="display:none;">
          <div id="saEditFolderTreeInner"></div>
        </div>
      </div>
      <div class="sa-modal-footer">
        <button id="saEditCancel" class="sa-modal-btn sa-modal-btn--cancel" data-i18n="cancel">取消</button>
        <button id="saEditSave" class="sa-modal-btn sa-modal-btn--save" data-i18n="save">保存</button>
      </div>
    </div>
  </div>

  <!-- 命令面板 -->
  <div id="saPaletteModal" class="sa-palette-overlay" style="display:none;">
    <div class="sa-palette">
      <div class="sa-palette-input-wrap">
        <svg class="sa-palette-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="saPaletteInput" class="sa-palette-input" type="text" autocomplete="off" spellcheck="false" data-i18n-placeholder="palettePlaceholder">
        <span class="sa-palette-hint" id="saPaletteHint">↑↓ Enter</span>
      </div>
      <div id="saPaletteResults" class="sa-palette-results"></div>
      <div class="sa-palette-footer">
        <span class="sa-palette-hint-text"><kbd>↑</kbd><kbd>↓</kbd> <span data-i18n="paletteNavigate">导航</span></span>
        <span class="sa-palette-hint-text"><kbd>Enter</kbd> <span data-i18n="paletteOpen">打开</span></span>
        <span class="sa-palette-hint-text"><kbd>Esc</kbd> <span data-i18n="paletteClose">关闭</span></span>
      </div>
    </div>
  </div>

  <!-- 批量打标签弹窗 -->
  <div id="saBulkTagModal" class="sa-modal-overlay" style="display:none;">
    <div class="sa-modal">
      <div class="sa-modal-header">
        <span class="sa-modal-title" data-i18n="bulkTagTitle">批量打标签</span>
        <button id="saBulkTagClose" class="sa-icon-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="sa-modal-body">
        <p class="sa-bulk-tag-hint" data-i18n="bulkTagHint">输入标签，多个用逗号分隔</p>
        <input id="saBulkTagInput" class="sa-edit-input" type="text" data-i18n-placeholder="bulkTagPlaceholder">
        <div id="saBulkTagSuggestions" class="sa-edit-tag-suggestions" style="display:none;position:static;border:none;box-shadow:none;padding:0;margin-top:4px;"></div>
      </div>
      <div class="sa-modal-footer">
        <button id="saBulkTagCancel" class="sa-modal-btn sa-modal-btn--cancel" data-i18n="cancel">取消</button>
        <button id="saBulkTagAdd" class="sa-modal-btn sa-modal-btn--save" data-i18n="bulkTagAdd">添加</button>
      </div>
    </div>
  </div>
<script src="../../shared/i18n.js"></script>
